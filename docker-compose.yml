services:
  app:
    build:
      context: ./backend-node
      dockerfile: Dockerfile
    container_name: lifecompass-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend-node/.env
    volumes:
      - lifecompass-data:/app/data

volumes:
  lifecompass-data:
